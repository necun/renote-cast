<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>ReNote Pen Cast Receiver</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #ffffff; overflow: hidden; }
    #stage { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    /* The page sheet: a fixed-aspect box, centred by the flex stage. The two canvases
       stack inside it — #paper draws the ruled lines, #pad draws the handwriting on top. */
    #sheet { position: relative; background: #ffffff; box-shadow: 0 0 0 1px #e0e0e0; }
    #sheet canvas { position: absolute; left: 0; top: 0; }
    #idle { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
            justify-content: center; font-family: sans-serif; color: #555; }
    #idle h1 { font-size: 42px; margin: 0 0 12px; }
    #idle p { font-size: 22px; margin: 0; color: #999; }
    .hidden { display: none !important; }
  </style>
  <!-- Cast Application Framework (CAF) receiver SDK -->
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
  <div id="idle">
    <h1>ReNote Pen Cast</h1>
    <p>Waiting for your notebook page…</p>
  </div>
  <div id="stage"><div id="sheet"><canvas id="paper"></canvas><canvas id="pad"></canvas></div></div>

  <script>
    // Must match GoogleCastTransport.NAMESPACE on the Android sender.
    const NAMESPACE = 'urn:x-cast:com.renote.pencast';

    // Logical paper sizes (pen units) — must match SignatureView / PaperCalibration on Android.
    // lx0/lx1/ly0/ly1 = the ruled-line area (where the 21 horizontal lines are drawn).
    const PAPER = {
      A5: { w: 3496, h: 4961, lx0: 405, lx1: 3225, ly0: 672, ly1: 4435 },
      A4: { w: 4961, h: 7016, lx0: 251, lx1: 4556, ly0: 516, ly1: 6340 }
    };
    const RULED_LINES = 21;   // must match SignatureView.numberOfLines

    const idleEl = document.getElementById('idle');
    const stageEl = document.getElementById('stage');
    const sheetEl = document.getElementById('sheet');
    const paperCanvas = document.getElementById('paper');
    const pctx = paperCanvas.getContext('2d');
    const canvas = document.getElementById('pad');
    const ctx = canvas.getContext('2d');

    let paper = PAPER.A5;       // current logical page size
    let ruled = true;           // draw the ruled-line background (off for custom/blank pages)
    let landscape = false;      // sender flag: false = PORTRAIT (wide upright page, image #14); true = LANDSCAPE (page rotated 90°, image #13)
    let scale = 1, offX = 0, offY = 0;   // UNIFORM scale (keeps the page's true proportions)
    let last = null;            // last point per active stroke {x,y}

    function layout() {
      const sw = window.innerWidth, sh = window.innerHeight;
      // UNIFORM scale always (scaleX == scaleY) → the page is NEVER distorted, and the writing
      // always sits exactly on its line. Nothing is ever rotated or cropped.
      if (!landscape) {
        // PORTRAIT = WIDE upright page that fills the whole TV (image #14). Scale to fit the HEIGHT
        // (so all 21 lines are visible, never cut), keep the writing at its exact coordinates, and
        // extend the horizontal ruled lines across the full width. Lines and text stay HORIZONTAL —
        // only the canvas (paper) grows wide. Nothing rotated.
        const s = sh / paper.h;
        scale = s;
        canvas.width = sw; canvas.height = sh;
        paperCanvas.width = sw; paperCanvas.height = sh;
        sheetEl.style.width = sw + 'px';
        sheetEl.style.height = sh + 'px';
        sheetEl.style.transform = 'none';
        // Centre the writing area horizontally; the lines still run edge to edge.
        offX = Math.round((sw - paper.w * s) / 2);
        offY = 0;
      } else {
        // LANDSCAPE = the whole page rotated 90° to fill the TV (image #13). Fit the ROTATED page
        // (swap w/h when fitting), draw the page + lines + strokes normally on a portrait-shaped
        // canvas, then CSS-rotate the sheet 90°. Uniform scale keeps the page undistorted and the
        // writing exactly on its lines — it just reads sideways.
        const s = Math.min(sw / paper.h, sh / paper.w);
        const cw = Math.round(paper.w * s);
        const ch = Math.round(paper.h * s);
        scale = s; offX = 0; offY = 0;
        canvas.width = cw; canvas.height = ch;
        paperCanvas.width = cw; paperCanvas.height = ch;
        sheetEl.style.width = cw + 'px';
        sheetEl.style.height = ch + 'px';
        sheetEl.style.transform = 'rotate(90deg)';
      }
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      drawRuled();
    }
    function mapX(x) { return x * scale + offX; }
    function mapY(y) { return y * scale + offY; }

    // Draw the 21 horizontal ruled lines on the paper layer (behind the handwriting), using the
    // same scale as the strokes so writing lines up exactly. Mirrors SignatureView's line drawing.
    // In the wide PORTRAIT layout the lines run the full canvas width (edge to edge); in the
    // rotated LANDSCAPE layout they span the page's writing area and rotate with the sheet.
    function drawRuled() {
      pctx.clearRect(0, 0, paperCanvas.width, paperCanvas.height);
      if (!ruled) return;
      const x0 = !landscape ? 0 : paper.lx0 * scale;
      const x1 = !landscape ? paperCanvas.width : paper.lx1 * scale;
      const y0 = paper.ly0 * scale + offY, y1 = paper.ly1 * scale + offY;
      const spacing = (y1 - y0) / (RULED_LINES - 1);
      pctx.strokeStyle = '#CCCCCC';
      pctx.lineWidth = 1;
      for (let i = 0; i < RULED_LINES; i++) {
        const y = Math.round(y0 + i * spacing) + 0.5; // +0.5 for crisp 1px lines
        pctx.beginPath();
        pctx.moveTo(x0, y);
        pctx.lineTo(x1, y);
        pctx.stroke();
      }
    }

    // ARGB int (from Android Color) -> CSS rgba string.
    function argb(i) {
      const a = ((i >> 24) & 0xff) / 255;
      const r = (i >> 16) & 0xff, g = (i >> 8) & 0xff, b = i & 0xff;
      return 'rgba(' + r + ',' + g + ',' + b + ',' + (a === 0 ? 1 : a) + ')';
    }
    function strokePx(widthLevel) {
      // width level 1..9 -> logical px, then to canvas scale. Tweak factor to taste.
      return Math.max(1, (widthLevel || 2) * 6 * scale);
    }

    function showPad() { idleEl.classList.add('hidden'); stageEl.classList.remove('hidden'); }
    function clearPad() { ctx.clearRect(0, 0, canvas.width, canvas.height); last = null; }

    // type: 0=PEN_DOWN, 1=PEN_MOVE, 2=PEN_UP
    function drawDot(d) {
      if (d.type === 0) { last = { x: d.x, y: d.y }; return; }
      if (last == null) { last = { x: d.x, y: d.y }; return; }
      ctx.strokeStyle = argb(d.color);
      ctx.lineWidth = strokePx(d.width);
      ctx.beginPath();
      ctx.moveTo(mapX(last.x), mapY(last.y));
      ctx.lineTo(mapX(d.x), mapY(d.y));
      ctx.stroke();
      if (d.type === 2) last = null; else last = { x: d.x, y: d.y };
    }

    function setPaper(key) {
      paper = (key && key.toUpperCase().indexOf('A4') >= 0) ? PAPER.A4 : PAPER.A5;
      layout();
    }

    // Handle one CastMessage envelope {t, d} (d is a JSON string).
    function handle(env) {
      let data = {};
      try { data = env.d ? JSON.parse(env.d) : {}; } catch (e) { data = {}; }
      switch (env.t) {
        case 'hello':
          showPad();
          // ruled defaults on; sender may send ruled:false for custom/blank pages.
          ruled = (data.ruled === undefined) ? true : !!data.ruled;
          landscape = !!data.landscape;   // rotate the whole page 90° for real landscape
          setPaper(data.paperSizeKey); // setPaper() calls layout(), which redraws the ruled lines
          clearPad();
          break;
        case 'snapshot':
          showPad(); clearPad();
          (data.dots || []).forEach(drawDot);
          break;
        case 'dots':
          showPad();
          (data.dots || []).forEach(drawDot);
          break;
        case 'page':
          clearPad();
          break;
        case 'clear':
          clearPad();
          break;
        case 'bye':
          clearPad(); stageEl.classList.add('hidden'); idleEl.classList.remove('hidden');
          break;
      }
    }

    window.addEventListener('resize', layout);
    layout();

    const context = cast.framework.CastReceiverContext.getInstance();
    context.addCustomMessageListener(NAMESPACE, function (event) {
      const m = event.data;
      // Sender may deliver the envelope as an object or as a JSON string.
      const env = (typeof m === 'string') ? JSON.parse(m) : m;
      handle(env);
    });

    // Keep the receiver alive; it's an interactive (non-media) app.
    const options = new cast.framework.CastReceiverOptions();
    options.disableIdleTimeout = true;
    options.maxInactivity = 3600;
    context.start(options);
  </script>
</body>
</html>
