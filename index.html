<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>ReNote Pen Cast Receiver</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #ffffff; overflow: hidden; }
    #stage { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    #sheet { position: relative; background: #ffffff; box-shadow: 0 0 0 1px #e0e0e0; }
    #sheet canvas { position: absolute; left: 0; top: 0; }
    #idle { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
            justify-content: center; font-family: sans-serif; color: #555; }
    #idle h1 { font-size: 42px; margin: 0 0 12px; }
    #idle p { font-size: 22px; margin: 0; color: #999; }
    .hidden { display: none !important; }
  </style>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
  <div id="idle">
    <h1>ReNote Pen Cast</h1>
    <p>Waiting for your notebook page…</p>
  </div>
  <div id="stage" class="hidden"><div id="sheet"><canvas id="paper"></canvas><canvas id="pad"></canvas></div></div>

  <script>
    const NAMESPACE = 'urn:x-cast:com.renote.pencast';

    const PAPER = {
      A5: { w: 3496, h: 4961, lx0: 405, lx1: 3225, ly0: 672, ly1: 4435 },
      A4: { w: 4961, h: 7016, lx0: 251, lx1: 4556, ly0: 516, ly1: 6340 }
    };
    const RULED_LINES = 21;

    const idleEl = document.getElementById('idle');
    const stageEl = document.getElementById('stage');
    const sheetEl = document.getElementById('sheet');
    const paperCanvas = document.getElementById('paper');
    const pctx = paperCanvas.getContext('2d');
    const canvas = document.getElementById('pad');
    const ctx = canvas.getContext('2d');

    let paper = PAPER.A5;
    let ruled = true;
    let landscape = false;      // false = PORTRAIT (vertical page, centred); true = LANDSCAPE (page rotated 90° to horizontal)
    let scale = 1, offX = 0, offY = 0;
    let last = null;

    function layout() {
      const sw = window.innerWidth, sh = window.innerHeight;
      if (!landscape) {
        // PORTRAIT = page vertical, true aspect, centred (matches Samsung mirror portrait).
        const s = Math.min(sw / paper.w, sh / paper.h);
        const cw = Math.round(paper.w * s);
        const ch = Math.round(paper.h * s);
        scale = s; offX = 0; offY = 0;
        canvas.width = cw; canvas.height = ch;
        paperCanvas.width = cw; paperCanvas.height = ch;
        sheetEl.style.width = cw + 'px';
        sheetEl.style.height = ch + 'px';
        sheetEl.style.transform = 'none';
      } else {
        // LANDSCAPE = whole page rotated 90° (left) to horizontal, centred + filling (matches Samsung).
        const s = Math.min(sw / paper.h, sh / paper.w);
        const cw = Math.round(paper.w * s);
        const ch = Math.round(paper.h * s);
        scale = s; offX = 0; offY = 0;
        canvas.width = cw; canvas.height = ch;
        paperCanvas.width = cw; paperCanvas.height = ch;
        sheetEl.style.width = cw + 'px';
        sheetEl.style.height = ch + 'px';
        sheetEl.style.transform = 'rotate(-90deg)';
      }
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      drawRuled();
    }
    function mapX(x) { return x * scale + offX; }
    function mapY(y) { return y * scale + offY; }

    function drawRuled() {
      pctx.clearRect(0, 0, paperCanvas.width, paperCanvas.height);
      if (!ruled) return;
      const x0 = paper.lx0 * scale;
      const x1 = paper.lx1 * scale;
      const y0 = paper.ly0 * scale + offY, y1 = paper.ly1 * scale + offY;
      const spacing = (y1 - y0) / (RULED_LINES - 1);
      pctx.strokeStyle = '#CCCCCC';
      pctx.lineWidth = 1;
      for (let i = 0; i < RULED_LINES; i++) {
        const y = Math.round(y0 + i * spacing) + 0.5;
        pctx.beginPath();
        pctx.moveTo(x0, y);
        pctx.lineTo(x1, y);
        pctx.stroke();
      }
    }

    function argb(i) {
      const a = ((i >> 24) & 0xff) / 255;
      const r = (i >> 16) & 0xff, g = (i >> 8) & 0xff, b = i & 0xff;
      return 'rgba(' + r + ',' + g + ',' + b + ',' + (a === 0 ? 1 : a) + ')';
    }
    function strokePx(level) {
      // Mirror Android's Glo.lineWidthByLevel2: width ∝ paper width × per-level factor, so TV
      // strokes match the phone's thickness (medium ≈ 0.5% of the page) across A4/A5.
      const lvl = level || 6;
      const factor = lvl >= 10 ? 3.6 : lvl >= 6 ? 2.5 : lvl >= 2 ? 1.6 : 1.0;
      return Math.max(1, paper.w * 0.002 * factor * scale);
    }

    function showPad() { idleEl.classList.add('hidden'); stageEl.classList.remove('hidden'); }
    function clearPad() { ctx.clearRect(0, 0, canvas.width, canvas.height); last = null; }

    function drawDot(d) {
      if (d.type === 0) { last = { x: d.x, y: d.y }; return; }
      if (last == null) { last = { x: d.x, y: d.y }; return; }
      ctx.strokeStyle = argb(d.color);
      ctx.lineWidth = strokePx(d.width);
      ctx.beginPath();
      ctx.moveTo(mapX(last.x), mapY(last.y));
      ctx.lineTo(mapX(d.x), mapY(d.y));
      ctx.stroke();
      if (d.type === 2) last = null; else last = { x: d.x, y: d.y };
    }

    function setPaper(key) {
      paper = (key && key.toUpperCase().indexOf('A4') >= 0) ? PAPER.A4 : PAPER.A5;
      layout();
    }

    function handle(env) {
      let data = {};
      try { data = env.d ? JSON.parse(env.d) : {}; } catch (e) { data = {}; }
      switch (env.t) {
        case 'hello':
          showPad();
          ruled = (data.ruled === undefined) ? true : !!data.ruled;
          landscape = !!data.landscape;
          setPaper(data.paperSizeKey);
          clearPad();
          break;
        case 'snapshot':
          showPad(); clearPad();
          (data.dots || []).forEach(drawDot);
          break;
        case 'dots':
          showPad();
          (data.dots || []).forEach(drawDot);
          break;
        case 'page':
          clearPad();
          break;
        case 'clear':
          clearPad();
          break;
        case 'bye':
          clearPad(); stageEl.classList.add('hidden'); idleEl.classList.remove('hidden');
          break;
      }
    }

    window.addEventListener('resize', layout);
    layout();

    const context = cast.framework.CastReceiverContext.getInstance();
    context.addCustomMessageListener(NAMESPACE, function (event) {
      const m = event.data;
      const env = (typeof m === 'string') ? JSON.parse(m) : m;
      handle(env);
    });

    const options = new cast.framework.CastReceiverOptions();
    options.disableIdleTimeout = true;
    options.maxInactivity = 3600;
    context.start(options);
  </script>
</body>
</html>
